<!DOCTYPE html>
<html><head><title>Internal Wiki Assistant</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 860px; margin: 0 auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
.header { background: #161b22; color: #e6edf3; padding: 20px 24px; border-radius: 12px 12px 0 0; border: 1px solid #30363d; border-bottom: none; }
.header h2 { margin: 0 0 4px 0; font-size: 20px; }
.header p { margin: 0; opacity: 0.7; font-size: 14px; }
#chat { background: #0d1117; border: 1px solid #30363d; border-top: none; height: 520px; overflow-y: auto; padding: 16px; }
.msg { margin: 10px 0; padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 14px; }
.msg a { color: #58a6ff; text-decoration: underline; }
.user { background: #1f6feb; color: #fff; margin-left: auto; text-align: right; }
.user a { color: #a5d6ff; }
.bot { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; white-space: pre-wrap; }
.input-bar { display: flex; gap: 8px; padding: 12px; background: #161b22; border: 1px solid #30363d; border-top: none; border-radius: 0 0 12px 12px; }
.input-bar input { flex: 1; padding: 10px 14px; border: 1px solid #30363d; border-radius: 8px; font-size: 14px; background: #0d1117; color: #c9d1d9; }
.input-bar input::placeholder { color: #484f58; }
.input-bar button { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.input-bar button:hover { background: #2ea043; }
</style></head>
<body>
<div class="header">
    <h2>Internal Wiki Assistant</h2>
    <p>Your MegacorpOne AI knowledge base assistant. Ask about IT procedures, company policies, HR, facilities, and more.</p>
</div>
<div id="chat"></div>
<div class="input-bar">
    <input id="input" placeholder="Type your question..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">Send</button>
</div>
<script>
let sid = null;
async function send() {
    const inp = document.getElementById('input');
    const msg = inp.value.trim();
    if (!msg) return;
    inp.value = '';
    addMsg(msg, 'user');
    const body = {message: msg};
    if (sid) body.session_id = sid;
    const r = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const d = await r.json();
    sid = d.session_id;
    addMsg(d.response, 'bot');
}
function renderLinks(text) {
    // Convert markdown links [text](url) to HTML
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    // Convert bare URLs to clickable links (but not already inside href)
    text = text.replace(/(?<!href="|">)(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
    // Convert **bold** to <strong>
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Convert newlines
    text = text.replace(/\n/g, '<br>');
    return text;
}
function addMsg(text, cls) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = renderLinks(text);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>
</body></html>
